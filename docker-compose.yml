services:
  cowrie-test:
    image: cowrie/cowrie:3.0
    container_name: cowrie-test
    network_mode: host
    expose:
      - 22
      - 9000
    restart: unless-stopped
    environment:
      COWRIE_HONEYPOT_SENSOR_NAME: test
      COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=10.20.0.36\ntcp:22:interface=172.101.0.1"
  cowrie-baseline:
    image: cowrie/cowrie:3.0
    container_name: cowrie-baseline
    network_mode: host
    expose:
      - 22
      - 9000
    restart: unless-stopped
    environment:
      COWRIE_OUTPUT_JSONLOG_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
      COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
      COWRIE_OUTPUT_SPLUNK_SOURCE: baseline
      COWRIE_HONEYPOT_SENSOR_NAME: baseline
      COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.2"
    volumes:
      - ./config/baseline/cowrie.cfg:/etc/cowrie/cowrie.cfg:ro
      - ./outputs/baseline/log:/cowrie/cowrie-git/var/log/cowrie
      - ./outputs/baseline/state:/cowrie/cowrie-git/var/lib/cowrie
  cowrie-hostname3:
   image: cowrie/cowrie:3.0
   container_name: cowrie-hostname3
   network_mode: host
   expose:
     - 22
     - 9000
   restart: unless-stopped
   environment:
     COWRIE_OUTPUT_JSONLOG_ENABLED: true
     COWRIE_OUTPUT_SPLUNK_ENABLED: true
     COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
     COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
     COWRIE_OUTPUT_SPLUNK_SOURCE: hostname3
     COWRIE_HONEYPOT_SENSOR_NAME: hostname3
     COWRIE_HONEYPOT_CONTENTS_PATH: /cowrie/cowrie-git/honeyfs
     COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.3"
   volumes:
     - ./config/hostname3/honeyfs:/cowrie/cowrie-git/honeyfs:ro
     - ./config/hostname3/cowrie.cfg:/etc/cowrie/cowrie.cfg:ro
     - ./outputs/hostname3/log:/cowrie/cowrie-git/var/log/cowrie
     - ./outputs/hostname3/state:/cowrie/cowrie-git/var/lib/cowrie
  cowrie-banner3:
   image: cowrie/cowrie:3.0
   container_name: cowrie-banner3
   network_mode: host
   expose:
     - 22
     - 9000
   restart: unless-stopped
   environment:
     COWRIE_OUTPUT_JSONLOG_ENABLED: true
     COWRIE_OUTPUT_SPLUNK_ENABLED: true
     COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
     COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
     COWRIE_OUTPUT_SPLUNK_SOURCE: banner3
     COWRIE_HONEYPOT_SENSOR_NAME: banner3
     COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.4"
   volumes:
     - ./config/banner3/cowrie.cfg:/etc/cowrie/cowrie.cfg:ro
     - ./outputs/banner3/log:/cowrie/cowrie-git/var/log/cowrie
     - ./outputs/banner3/state:/cowrie/cowrie-git/var/lib/cowrie
  cowrie-uname2:
