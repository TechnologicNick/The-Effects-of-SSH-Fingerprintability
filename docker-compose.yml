  cowrie-hosts2:
    image: cowrie/cowrie:3.0
    container_name: cowrie-hosts2
    network_mode: host
    expose:
      - 22
      - 9000
    restart: unless-stopped
    environment:
      COWRIE_OUTPUT_JSONLOG_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
      COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
      COWRIE_OUTPUT_SPLUNK_SOURCE: hosts2
      COWRIE_HONEYPOT_SENSOR_NAME: hosts2
      COWRIE_HONEYPOT_CONTENTS_PATH: /cowrie/cowrie-git/honeyfs
      COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.7"
    volumes:
      - ./config/hosts2/honeyfs:/cowrie/cowrie-git/honeyfs:ro
      - ./config/hosts2/cowrie.cfg:/etc/cowrie/cowrie.cfg:ro
      - ./outputs/hosts2/log:/cowrie/cowrie-git/var/log/cowrie
      - ./outputs/hosts2/state:/cowrie/cowrie-git/var/lib/cowrie
  cowrie-combined:
    image: cowrie/cowrie:3.0
    container_name: cowrie-combined
    network_mode: host
    expose:
      - 22
      - 9000
    restart: unless-stopped
    environment:
      COWRIE_OUTPUT_JSONLOG_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
      COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
      COWRIE_OUTPUT_SPLUNK_SOURCE: combined
      COWRIE_HONEYPOT_SENSOR_NAME: combined
      COWRIE_HONEYPOT_CONTENTS_PATH: /cowrie/cowrie-git/honeyfs
      COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.8"
    volumes:
      - ./config/combined/honeyfs:/cowrie/cowrie-git/honeyfs:ro
      - ./config/combined/cowrie.cfg:/etc/cowrie/cowrie.cfg:ro
      - ./outputs/combined/log:/cowrie/cowrie-git/var/log/cowrie
      - ./outputs/combined/state:/cowrie/cowrie-git/var/lib/cowrie
  cowrie-raspberrypi4-deploy2:
    build:
      context: ./config/raspberrypi4
      dockerfile: Dockerfile
    container_name: cowrie-raspberrypi4-deploy2
    network_mode: host
    expose:
      - 22
      - 9000
    restart: unless-stopped
    environment:
      COWRIE_OUTPUT_JSONLOG_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_ENABLED: true
      COWRIE_OUTPUT_SPLUNK_URL: https://localhost:8088/services/collector/event
      COWRIE_OUTPUT_SPLUNK_TOKEN: 050f6d46-f02e-4844-9426-32c250ad76db
      COWRIE_OUTPUT_SPLUNK_SOURCE: raspberrypi4_deploy2
      COWRIE_HONEYPOT_SENSOR_NAME: raspberrypi4_deploy2
      COWRIE_HONEYPOT_CONTENTS_PATH: /cowrie/cowrie-git/honeyfs
      COWRIE_SSH_LISTEN_ENDPOINTS: "tcp:22:interface=172.101.0.9"
    volumes:
      # For this configration, configs are already in the Docker image
      - ./outputs/raspberrypi4_deploy2/log:/cowrie/cowrie-git/var/log/cowrie
      - ./outputs/raspberrypi4_deploy2/state:/cowrie/cowrie-git/var/lib/cowrie
  splunk:
    image: splunk/splunk:10.4-rhel9
    container_name: splunk
    network_mode: host
    expose:
      - 8000
      - 8088
    restart: unless-stopped
    volumes:
      - splunk_var:/opt/splunk/var
      - splunk_etc:/opt/splunk/etc
    environment:
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_GENERAL_TERMS: "--accept-sgt-current-at-splunk-com"
      SPLUNK_PASSWORD: "sshhoneypot"

volumes:
  splunk_var: {}
  splunk_etc: {}
